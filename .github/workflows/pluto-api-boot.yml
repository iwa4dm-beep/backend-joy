name: pluto-api-boot

on:
  push:
    paths:
      - "pluto-backend/**"
      - ".github/workflows/pluto-api-boot.yml"
  pull_request:
    paths:
      - "pluto-backend/**"

jobs:
  boot-and-verify:
    name: AUTO_MIGRATE=1 boot + /health/migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pluto
          POSTGRES_PASSWORD: plutopw
          POSTGRES_DB: pluto
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U pluto"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s --health-timeout=5s --health-retries=10

    env:
      NODE_ENV: production
      PORT: "3000"
      HOST: 127.0.0.1
      DATABASE_URL: postgres://pluto:plutopw@localhost:5432/pluto
      REDIS_URL: redis://localhost:6379
      PLUTO_JWT_SECRET: ci_test_secret_ci_test_secret_ci_test_secret_ci_test_1234
      JWT_ISSUER: http://localhost:3000
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ci
      S3_SECRET_KEY: cisecret
      S3_BUCKET: pluto
      CORS_ORIGINS: "*"
      AUTO_MIGRATE: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm", cache-dependency-path: pluto-backend/pnpm-lock.yaml }

      - name: Install
        working-directory: pluto-backend
        run: pnpm install --frozen-lockfile=false

      - name: Build API
        working-directory: pluto-backend
        run: pnpm --filter @pluto/api build

      - name: Boot API via entrypoint (AUTO_MIGRATE=1)
        working-directory: pluto-backend
        run: |
          nohup sh packages/api/scripts/entrypoint.sh > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
          echo "▶ waiting for /livez"
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:3000/livez >/dev/null 2>&1; then
              echo "✔ api up after ${i}s"; break
            fi
            sleep 1
          done

      - name: Verify GET /health/migrations returns 200
        run: |
          set -e
          code=$(curl -s -o /tmp/health.json -w '%{http_code}' http://127.0.0.1:3000/health/migrations)
          cat /tmp/health.json | head -c 4000; echo
          test "$code" = "200" || { echo "::error::/health/migrations returned $code"; exit 1; }
          # auth.* shim probes must all be ok
          node -e "const r=require('/tmp/health.json');const b=r.auth_shim?.ok;if(!b){console.error('auth_shim not ok',JSON.stringify(r.auth_shim));process.exit(1)}"

      - name: Verify a basic route responds (/healthz)
        run: |
          code=$(curl -s -o /tmp/healthz.json -w '%{http_code}' http://127.0.0.1:3000/healthz)
          cat /tmp/healthz.json; echo
          test "$code" = "200" || { echo "::error::/healthz returned $code"; exit 1; }

      - name: Dump api logs on failure
        if: failure()
        run: tail -n 200 /tmp/api.log || true

      - name: Stop API
        if: always()
        run: kill "$(cat /tmp/api.pid)" 2>/dev/null || true
