version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pluto
      POSTGRES_PASSWORD: pluto
      POSTGRES_DB: pluto
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./apps/server/src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pluto -d pluto"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI

  api:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      mailpit:
        condition: service_started
    environment:
      PORT: "8000"
      DATABASE_URL: "postgres://pluto:pluto@postgres:5432/pluto"
      JWT_SECRET: "dev-only-change-me"
      ANON_KEY: "pk_anon_dev"
      SERVICE_ROLE_KEY: "sk_service_dev"
      STORAGE_DRIVER: "s3"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET: "pluto"
      SMTP_URL: "smtp://mailpit:1025"
    ports: ["8000:8000"]

volumes:
  pg_data:
  minio_data:
